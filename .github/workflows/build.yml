name: Build BL-MT798x Firmware

on:
  workflow_dispatch:
    inputs:
      target:
        description: '选择编译目标'
        required: true
        type: choice
        default: 'all'
        options:
          # ─── 全部 ───
          - 'all'
          # ─── MT7981 ───
          - 'mt7981:360t7'
          - 'mt7981:abt_asr3000'
          - 'mt7981:ax3000t'
          - 'mt7981:ax3000t_an8855'
          - 'mt7981:cetron_ct3003'
          - 'mt7981:clt_r30b1'
          - 'mt7981:cmcc_a10'
          - 'mt7981:cmcc_rax3000m'
          - 'mt7981:cmcc_rax3000m-emmc'
          - 'mt7981:cmcc_xr30'
          - 'mt7981:cmcc_xr30-emmc'
          - 'mt7981:cudy_tr3000-v1'
          - 'mt7981:glinet_gl-mt2500'
          - 'mt7981:glinet_gl-mt3000'
          - 'mt7981:h3c_magic-nx30-pro'
          - 'mt7981:honor_fur-602'
          - 'mt7981:imou_lc-hx3001'
          - 'mt7981:jcg_q30'
          - 'mt7981:konka_komi-a31'
          - 'mt7981:livinet_zr-3020'
          - 'mt7981:newland_nl-wr8103'
          - 'mt7981:newland_nl-wr9103'
          - 'mt7981:nokia_ea0326gmp'
          - 'mt7981:openembed_som7981'
          - 'mt7981:rfb_spim_nand'
          - 'mt7981:ruijie_rg-x30e'
          - 'mt7981:ruijie_rg-x30e-pro'
          - 'mt7981:wr30u'
          # ─── MT7986 ───
          - 'mt7986:glinet_gl-mt6000'
          - 'mt7986:jdcloud_re-cp-03'
          - 'mt7986:netcore_n60'
          - 'mt7986:netcore_n60-pro'
          - 'mt7986:redmi_ax6000'
          - 'mt7986:rfb_spim_nand'
          - 'mt7986:ruijie_ew-6000gx-pro'
          - 'mt7986:ruijie_rg-x60'
          - 'mt7986:ruijie_rg-x60-pro'
          - 'mt7986:tplink_tl-xdr608x'
          - 'mt7986:tplink_tl-xtr8488'
          - 'mt7986:zyxel_ex5700'
          # ─── MT7987 ───
          - 'mt7987:airpi_h5000m'
          - 'mt7987:tenda_be12-pro'
          # ─── MT7988 ───
          - 'mt7988:rfb_spim_nand'
      multilayout:
        description: '启用 MULTI_LAYOUT 多分区模式（仅部分机型支持）'
        type: boolean
        default: false

jobs:
  prepare:
    name: 准备编译矩阵
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 生成编译矩阵
        id: set-matrix
        run: |
          TARGET="${{ inputs.target }}"

          ATF_DIR="atf-20240117-bacca82a8"
          UBOOT_OLD="uboot-mtk-20230718-09eda825"
          UBOOT_NEW="uboot-mtk-20250711"

          get_uboot_dir() {
            case "$1" in
              mt7987) echo "$UBOOT_NEW" ;;
              *) echo "$UBOOT_OLD" ;;
            esac
          }

          items=()
          count=0

          add_target() {
            local soc="$1" board="$2"
            local uboot_dir=$(get_uboot_dir "$soc")
            local atf_config="$ATF_DIR/configs/${soc}_${board}_defconfig"
            local uboot_config="$uboot_dir/configs/${soc}_${board}_defconfig"

            if [ -f "$atf_config" ] && [ -f "$uboot_config" ]; then
              items+=("{\"soc\":\"$soc\",\"board\":\"$board\"}")
              count=$((count + 1))
            else
              echo "::warning::跳过 ${soc}_${board}：缺少 ATF 或 U-Boot 配置"
            fi
          }

          if [ "$TARGET" = "all" ]; then
            echo "==> 扫描全部有效编译目标..."
            for atf_config in "$ATF_DIR"/configs/mt798*_*_defconfig; do
              [ -f "$atf_config" ] || continue
              filename=$(basename "$atf_config" _defconfig)
              soc="${filename%%_*}"
              board="${filename#*_}"

              # 跳过 multi_layout 变体
              case "$board" in *multi_layout*) continue ;; esac

              add_target "$soc" "$board"
            done
          else
            # 解析 soc:board 格式
            soc="${TARGET%%:*}"
            board="${TARGET#*:}"
            echo "==> 编译目标: SOC=$soc BOARD=$board"
            add_target "$soc" "$board"
          fi

          if [ "$count" -eq 0 ]; then
            echo "::error::未找到匹配的编译目标！TARGET=$TARGET"
            exit 1
          fi

          # 生成 JSON 矩阵
          matrix_json='{"include":['
          for i in "${!items[@]}"; do
            if [ "$i" -gt 0 ]; then
              matrix_json+=','
            fi
            matrix_json+="${items[$i]}"
          done
          matrix_json+=']}'

          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "编译目标数量: $count"
          echo "矩阵: $matrix_json"

  build:
    name: 编译 ${{ matrix.soc }}_${{ matrix.board }}
    needs: prepare
    if: ${{ needs.prepare.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu python3 device-tree-compiler

      - name: 编译 ${{ matrix.soc }}_${{ matrix.board }}
        run: |
          echo "============================================"
          echo "编译目标: SOC=${{ matrix.soc }} BOARD=${{ matrix.board }}"
          echo "MULTI_LAYOUT=${{ inputs.multilayout && '1' || '0' }}"
          echo "============================================"
          export SOC="${{ matrix.soc }}"
          export BOARD="${{ matrix.board }}"
          export MULTI_LAYOUT="${{ inputs.multilayout && '1' || '0' }}"
          bash build.sh

      - name: 上传构建产物 (${{ matrix.soc }}_${{ matrix.board }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.soc }}_${{ matrix.board }}
          path: output/
          retention-days: 30

  summary:
    name: 编译汇总 & 发布
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 汇总结果
        run: |
          echo "## BL-MT798x 编译结果" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ **全部编译成功**" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ **存在编译失败**，请查看上方日志" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⏭️ 已跳过" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 下载全部构建产物
        if: ${{ needs.build.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: 列出产物文件
        if: ${{ needs.build.result == 'success' }}
        run: |
          echo "产物文件列表:"
          ls -lh release/

      - name: 发布到 GitHub Releases
        if: ${{ needs.build.result == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }} (${{ github.ref_name }})
          body: |
            ## 编译信息
            - **目标**: ${{ inputs.target }}
            - **MULTI_LAYOUT**: ${{ inputs.multilayout && '是' || '否' }}
            - **提交**: ${{ github.sha }}
            - **时间**: ${{ github.event.repository.updated_at }}

            ## 产物文件
            点击下方链接下载对应机型的 FIP/BL2 固件。
          files: release/*
          draft: false
          make_latest: true
